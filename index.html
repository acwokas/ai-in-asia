    <script>
      (function() {
        if (window.location.hostname === 'ai-in-asia.lovable.app') {
          window.location.replace(
            'https://aiinasia.com' +
            window.location.pathname +
            window.location.search +
            window.location.hash
          );
          return
        }
      })();
    </script>
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var isDark = stored ? stored === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <script>
      // Auto-refresh every 60 minutes (skip admin section)
      (function() {
        var path = window.location.pathname.toLowerCase();
        if (path.indexOf('/admin') !== -1) return;
        setTimeout(function() {
          window.location.reload();
        }, 60 * 60 * 1000);
      })();
    </script>
