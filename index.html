<!doctype html>
<html lang="en-GB">
  <head>
    <script>
      (function() {
        if (window.location.hostname === 'ai-in-asia.lovable.app') {
          window.location.replace(
            'https://aiinasia.com' +
            window.location.pathname +
            window.location.search +
            window.location.hash
          );
          return
        }
      })();
    </script>
    <script>
      (function() {
        var stored = localStorage.getItem('aiia_theme') || localStorage.getItem('theme');
        var isDark = stored ? stored !== 'light' : true;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <script>
      // Auto-refresh every 60 minutes (skip admin section)
      (function() {
        var path = window.location.pathname.toLowerCase();
        if (path.indexOf('/admin') !== -1) return;
        setTimeout(function() {
          window.location.reload();
        }, 60 * 60 * 1000);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=5" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=5" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png?v=5" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/aiinasia-192.png?v=5" />
    <link rel="shortcut icon" href="/favicon.ico?v=5" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIinASIA" />
    <link rel="apple-touch-icon" href="/icons/aiinasia-ios-180.png" />
    
    <!-- Prerender signal: stays false until React sets article-specific meta -->
    <script>window.prerenderReady = false;</script>

    <!-- All title, description, OG, Twitter, and canonical tags are injected per-page by React Helmet -->

    
    
    <!-- Google AdSense: loaded dynamically after cookie consent -->

    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://pbmtnvxywplgpldmlygv.supabase.co" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    

    
    
    <!-- Cache static assets -->
    
    
    <!-- RSS Feeds -->
    <link rel="alternate" type="application/rss+xml" title="AI in ASIA RSS Feed" href="https://aiinasia.com/rss" />
    <link rel="alternate" type="application/rss+xml" title="AI in ASIA Feed" href="https://aiinasia.com/feed" />
    <link rel="alternate" hreflang="en-GB" href="https://aiinasia.com/" />
    <link rel="alternate" hreflang="x-default" href="https://aiinasia.com/" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- GTM: loaded dynamically after cookie consent -->
    <!-- Ensure dataLayer + gtag stub are available for React code -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
    </script>

    <!-- Ahrefs Analytics -->
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="ehgmS75pUla8HpRhvnD/1w" async></script>

    <!-- Machine-readable data feeds -->
    <link rel="alternate" type="application/json" title="Policy Atlas JSON" href="/api/policy-atlas.json" />
    <link rel="alternate" type="application/json" title="Events JSON" href="/api/events.json" />
    <link rel="author" href="/llms.txt" />

    <!-- Schema.org Organization JSON-LD -->

      "@context": "https://schema.org",

      "name": "AI in Asia",

      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@aiinasia.com",
        "contactType": "editorial"
      }
    }

  </head>
